<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume — Zaccaria Scarpa ePortfolio</title>
  <meta name="description" content="Resume — Zaccaria Scarpa, FSU Statistics, Full Stack Developer" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ===================== NAVIGATION ===================== -->
  <nav class="site-nav" aria-label="Main navigation">
    <a href="index.html" class="nav-brand">
      Z. <span>Scarpa</span>
    </a>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="work.html">Work</a></li>
      <li><a href="resume.html" class="active">Resume</a></li>
      <li><a href="reflection.html">Reflection</a></li>
    </ul>
  </nav>

  <div class="page-content">

    <!-- ===================== PAGE HERO ===================== -->
    <header class="page-hero" aria-label="Page title">
      <p class="page-hero-kicker">Professional Background</p>
      <h1 class="page-hero-title">Resume</h1>
      <p class="page-hero-sub">Florida State University · Class of 2028</p>
    </header>

    <main>
      <section class="section" aria-label="Resume document">
        <div class="container">

          <!-- Actions row -->
          <div class="resume-actions fade-in">
            <a
              href="assets/files/resume.pdf"
              class="btn btn-solid"
              download
              aria-label="Download resume as PDF"
            >
              Download Resume
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                <path d="M7 2v8M3.5 7.5L7 11l3.5-3.5M2 12h10"/>
              </svg>
            </a>
            <a
              href="assets/files/resume.pdf"
              class="btn"
              target="_blank"
              rel="noopener"
              aria-label="Open resume in new tab"
            >
              Open in New Tab
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                <path d="M2 11L11 2M5 2h6v6"/>
              </svg>
            </a>
          </div>

          <!-- Embedded Resume PDF -->
          <div class="resume-embed-wrapper fade-in">
            <iframe
              src="assets/files/resume.pdf"
              title="Zaccaria Scarpa Resume"
              loading="lazy"
              aria-label="Resume PDF document"
            >
              <!-- Fallback for browsers that don't render PDFs inline -->
              <div style="padding: 3rem; text-align:center; background: var(--ink);">
                <p style="color:rgba(255,255,255,0.6); margin-bottom:1.2rem; font-size:0.95rem;">
                  Your browser does not support inline PDF viewing.
                </p>
                <a href="assets/files/resume.pdf" class="btn" download>
                  Download Resume PDF
                </a>
              </div>
            </iframe>
          </div>

        </div>
      </section>
    </main>

    <!-- ===================== FOOTER ===================== -->
    <footer class="site-footer">
      <p>ENC 3416 · Spring 2026 · Florida State University &nbsp;|&nbsp; <span>Zaccaria Scarpa</span></p>
    </footer>

  </div>

  <!-- ===================== SCRIPTS ===================== -->
  <script>
    // Mobile nav toggle
    const toggle = document.getElementById('navToggle');
    const links  = document.getElementById('navLinks');
    toggle.addEventListener('click', () => links.classList.toggle('open'));

    // Scroll-triggered fade-ins
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.08 });

    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
  </script>
</body>
</html>
